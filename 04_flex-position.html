<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>플로트와 포지션</title>
    <style>
      .float-box {
        width: 100px;
        height: 100px;
        background-color: brown;
        /* display: inline; */
        /* display: inline-block; */
        float: left;
      }
      .float-box-right {
        float: right;
      }
      .container {
        border: 1px solid yellowgreen;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="float-box">박스1</div>
      <div class="float-box float-box-right">박스2</div>
      <div class="float-box">박스3</div>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Ratione, itaque
      optio possimus neque ad eligendi aut minima! In, corrupti earum nulla
      laborum obcaecati quaerat deserunt. Asperiores eveniet quaerat possimus
      voluptatibus?
    </div>
    <!-- 1. 자식요소가 모두 float면 스스로의 height를 가지지 못함 (content) -->
    <div class="container" style="overflow: hidden">
      <!-- (float) clear : both (left+right) -->
      <div style="clear: both"></div>
      <!-- 2. float가 밑으로 쳐져도 float들끼리는 충돌해서 서로의 영역을 침범하지 않음 -->
      <div class="float-box float-box-right">박스a</div>
      <div class="float-box">박스b</div>
      <div class="float-box">박스c</div>
    </div>
    <hr />
    <!-- emmet -> 선택자의 문법을 바탕으로 (이외에도 좀 플러스) 간단하게 html 태그를 구조화하며 만들 수 있는 단축어 -->
    <!-- https://inpa.tistory.com/entry/HTML-%F0%9F%8E%A8-Emmet-%EB%AC%B8%EB%B2%95-%EC%A0%95%EB%A6%AC -->

    
    <!--  -->
    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
  </body>
</html>
