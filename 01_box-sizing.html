<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Box Sizing</title>
    <style>
      div {
        width: 200px; /* 너비, 가로폭 */
        height: 100px; /* 높이, 세로폭 */
        border: 5px solid green;
        padding: 20px;
        margin: 20px;
      }
    </style>
  </head>
  <body>
    <p>기본 위아래 여백이 있음</p>
    <!-- 기본 박스 (content-box) -->
    <div>div</div>
    한줄을 다 차지
  </body>
</html>
